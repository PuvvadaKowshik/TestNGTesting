# ============================== 

# Root Logger Configuration 

# ============================== 

 

# Define root logger level (info = show info, warn, error) 

rootLogger.level = info 

 

# Attach appenders (where logs will be printed) 

rootLogger.appenderRefs = console, file 

 

# Link console appender 

rootLogger.appenderRef.console.ref = ConsoleAppender 

 

# Link file appender 

rootLogger.appenderRef.file.ref = FileAppender 

 

 

# ============================== 

# Console Appender Configuration 

# ============================== 

 

# Define appender type (console = print in Eclipse/terminal) 

appender.console.type = Console 

 

# Name of the console appender (used above) 

appender.console.name = ConsoleAppender 

 

# Output target (SYSTEM_OUT = console) 

appender.console.target = SYSTEM_OUT 

 

# Layout type (pattern-based logging) 

appender.console.layout.type = PatternLayout 

 

# Log format: 

# %d = date/time 

# [%t] = thread 

# %-5level = log level (INFO, ERROR) 

# %logger = class name 

# %msg = message 

# %n = new line 

appender.console.layout.pattern = %d{HH:mm:ss} [%t] %-5level %logger - %msg%n 

 

 

# ============================== 

# File Appender Configuration 

# ============================== 

 

# Define appender type (file = save logs in file) 

appender.file.type = File 

 

# Name of the file appender 

appender.file.name = FileAppender 

 

# File location (logs folder will be auto-created) 

appender.file.fileName = logs/automation.log 

 

# Layout type 

appender.file.layout.type = PatternLayout 

 

# Detailed log format for file 

appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n 

